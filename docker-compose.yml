version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PORT=8000
    env_file:
      - .env

  frontend:
    build: .
    command: streamlit run backend/streamlit_app.py
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - PORT=8501
    env_file:
      - .env
